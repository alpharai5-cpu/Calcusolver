<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Modern Calculator</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .calculator {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 400px;
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
        }
        .button {
            background-color: #3a3a3a;
            border: none;
            border-radius: 5px;
            padding: 20px;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #4a4a4a;
        }
        .display {
            grid-column: span 4;
            background-color: #1a1a1a;
            padding: 20px;
            font-size: 24px;
            text-align: right;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <button class="button" onclick="clearDisplay()">C</button>
        <button class="button" onclick="appendToDisplay('7')">7</button>
        <button class="button" onclick="appendToDisplay('8')">8</button>
        <button class="button" onclick="appendToDisplay('9')">9</button>
        <button class="button" onclick="appendToDisplay('/')">÷</button>
        <button class="button" onclick="appendToDisplay('4')">4</button>
        <button class="button" onclick="appendToDisplay('5')">5</button>
        <button class="button" onclick="appendToDisplay('6')">6</button>
        <button class="button" onclick="appendToDisplay('*')">×</button>
        <button class="button" onclick="appendToDisplay('1')">1</button>
        <button class="button" onclick="appendToDisplay('2')">2</button>
        <button class="button" onclick="appendToDisplay('3')">3</button>
        <button class="button" onclick="appendToDisplay('-')">-</button>
        <button class="button" onclick="appendToDisplay('0')">0</button>
        <button class="button" onclick="appendToDisplay('.')">.</button>
        <button class="button" onclick="calculate()">=</button>
        <button class="button" onclick="appendToDisplay('+')">+</button>
        <button class="button" onclick="appendToDisplay('Math.sin(')">sin</button>
        <button class="button" onclick="appendToDisplay('Math.cos(')">cos</button>
        <button class="button" onclick="appendToDisplay('Math.tan(')">tan</button>
        <button class="button" onclick="appendToDisplay('Math.log(')">log</button>
        <button class="button" onclick="appendToDisplay('**')">x^y</button>
        <button class="button" onclick="appendToDisplay('Math.sqrt(')">√</button>
        <button class="button" onclick="appendToDisplay('!')">!</button>
        <button class="button" onclick="toggleDarkMode()">Code Mode</button>
    </div>
    <script>
        let history = [];
        let display = document.getElementById('display');

        function appendToDisplay(value) {
            display.innerText += value;
        }

        function clearDisplay() {
            display.innerText = '0';
        }

        function calculate() {
            try {
                let result = eval(display.innerText);
                display.innerText = result;
                history.push(result);
            } catch (error) {
                display.innerText = 'Error';
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        document.addEventListener('keydown', (event) => {
            if (!isNaN(event.key) || event.key === '+' || event.key === '-' || event.key === '*' || event.key === '/') {
                appendToDisplay(event.key);
            } else if (event.key === 'Enter') {
                calculate();
            } else if (event.key === 'Backspace') {
                clearDisplay();
            }
        });
    </script>
</body>
</html>
