<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcusolver</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Calcusolver</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#calculator">Calculator</a></li>
            <li><a href="#code-mode">Code Mode Emulator</a></li>
        </ul>
    </nav>
    <main>
        <section id="calculator">
            <h2>Calculator</h2>
            <input type="text" id="calc-input" placeholder="Enter calculation">
            <button id="calc-equal">=</button>
            <div id="calc-result"></div>
        </section>
        <section id="code-mode">
            <h2>Code Mode Emulator</h2>
            <input type="file" id="rom-upload" accept="application/octet-stream">
            <button id="load-rom">Load ROM</button>
            <div id="n64-emulator"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
