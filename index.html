<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        /* Basic styles for calculator and toggle */
    </style>
</head>
<body>
    <h1>Calculator</h1>
    <input type="text" id="input" placeholder="Enter calculation" />
    <button id="calculate">Calculate</button>
    <div>
        <label for="toggle">Emulator Mode:</label>
        <input type="checkbox" id="toggle" />
    </div>
    <div id="secret-code" style="display:none;">
        <input type="password" id="code" placeholder="Enter 4-digit code" />
    </div>
    <script>
        document.getElementById('toggle').addEventListener('change', function() {
            let codeInput = document.getElementById('secret-code');
            if (this.checked) {
                codeInput.style.display = 'block';
                setTimeout(() => {
                    codeInput.style.display = 'none';
                }, 1000);
            }
        });

        document.getElementById('calculate').addEventListener('click', function() {
            let input = document.getElementById('input').value;
            // Logic for PEMDAS, algebra, calculus, and fractions
            alert('Calculating: ' + input);
        });
    </script>
</body>
</html>
