<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Scientific Calculator | CalcSolver Plus</title>
    <style>
        /* Make it look like a boring school tool */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        #calculator-ui { width: 320px; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .screen { width: 100%; height: 50px; background: #eee; text-align: right; font-size: 24px; padding: 10px; box-sizing: border-box; margin-bottom: 10px; border: 1px solid #ccc; }
        .btn { width: 70px; height: 50px; margin: 2px; cursor: pointer; border: 1px solid #ddd; background: #f9f9f9; font-weight: bold; }
        
        /* The Secret Emulator UI - Hidden by default */
        #emulator-ui { display: none; width: 90vw; height: 85vh; background: #111; color: #0f0; padding: 20px; position: fixed; top: 20px; border: 3px solid #333; }
        h1 { font-family: 'Courier New', monospace; }
    </style>
</head>
<body>

    <div id="calculator-ui">
        <div class="screen" id="display">0</div>
        <div class="buttons">
            <button class="btn" onclick="press('7')">7</button>
            <button class="btn" onclick="press('8')">8</button>
            <button class="btn" onclick="press('9')">9</button><br>
            <button class="btn" onclick="press('4')">4</button>
            <button class="btn" onclick="press('5')">5</button>
            <button class="btn" onclick="press('6')">6</button><br>
            <button class="btn" onclick="press('1')">1</button>
            <button class="btn" onclick="press('2')">2</button>
            <button class="btn" onclick="press('3')">3</button><br>
            <button class="btn" onclick="press('0')">0</button>
            <button class="btn" style="background:#ff9500; color:white;" onclick="checkCode()">=</button>
            <button class="btn" onclick="clearCalc()">C</button>
        </div>
    </div>

    <div id="emulator-ui">
        <h1>PROJECT-X VIRTUAL SYSTEM</h1>
        <p>Status: Kernel Loaded. Select ROM...</p>
        <div style="border: 2px dashed #444; height: 300px; display: flex; align-items: center; justify-content: center;">
            <p>Drag and Drop .z64 or .v64 file here</p>
        </div>
        <button onclick="location.reload()" style="margin-top:20px;">Exit System</button>
    </div>

    <script>
        let currentInput = "";
        const secretCode = "0000";

        function press(num) {
            currentInput += num;
            document.getElementById('display').innerText = currentInput;
        }

        function clearCalc() {
            currentInput = "";
            document.getElementById('display').innerText = "0";
        }

        function checkCode() {
            if (currentInput === secretCode) {
                // UNLOCK THE EMULATOR
                document.getElementById('calculator-ui').style.display = 'none';
                document.getElementById('emulator-ui').style.display = 'block';
                document.body.style.background = "#000";
                console.log("System override initiated...");
            } else {
                // Just act like a normal calculator (simplified for demo)
                alert("Result: " + (eval(currentInput) || "Error"));
                clearCalc();
            }
        }
    </script>
</body>
</html>
